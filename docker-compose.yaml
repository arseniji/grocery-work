services:
  postgres:
    image: postgres:13
    environment:
      POSTGRES_DB: shop_development
      POSTGRES_USER: gshp
      POSTGRES_PASSWORD: ghbdtnbrb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gshp -d shop_development"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  client:
    build: ./client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    env_file:
      - ./client/.env.prod
    depends_on:
      - api

  api:
    build: ./server
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -p 3000 -b '0.0.0.0'"
    volumes:
      - ./server:/app
      - bundle_cache:/usr/local/bundle  # для кэширования гемов
    ports:
      - "4000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: gshp
      POSTGRES_PASSWORD: ghbdtnbrb
      REDIS_URL: redis://redis:6379/0
      RAILS_ENV: development
      RAILS_MAX_THREADS: 5
      SECRET_KEY_BASE: tvoia_mama
    stdin_open: true
    tty: true

  postgres_bff:
    image: postgres:17
    environment:
      POSTGRES_DB: bff_development
      POSTGRES_USER: bff_user
      POSTGRES_PASSWORD: bff_password
    ports:
      - "5434:5432"
    volumes:
      - postgres_bff_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bff_user -d bff_development"]
      interval: 10s
      timeout: 5s
      retries: 5

  bff:
    build: ./bffGrocery
    ports:
      - "8080:8080"
    env_file:
      - ./bffGrocery/.env
    environment:
      DB_URL: jdbc:postgresql://postgres_bff:5432/bff_development
      RAILS_URL: http://api:3000
    depends_on:
      postgres_bff:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  bundle_cache:
  postgres_bff_data:
