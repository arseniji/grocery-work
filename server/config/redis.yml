# config/redis.yml
default: &default
  url: <%= ENV.fetch('REDIS_URL', 'redis://localhost:6379/0') %>
  timeout: 5

development:
  <<: *default
  url: redis://redis:6379/0  # внутри Docker сети

test:
  <<: *default
  url: redis://localhost:6379/1

production:
  <<: *default
  url: <%= ENV['REDIS_URL'] %>