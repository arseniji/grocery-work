<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход — Grocery Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow" style="width: 360px;">
        <div class="card-body p-4">
            <h4 class="card-title mb-4 text-center">Grocery Admin</h4>

            <div th:if="${param.error}" class="alert alert-danger py-2">
                Неверный логин или пароль.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2">
                Вы вышли из системы.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Логин</label>
                    <input id="username" name="username" type="text"
                           class="form-control" autofocus required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input id="password" name="password" type="password"
                           class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>
        </div>
    </div>
</div>
</body>
</html>
