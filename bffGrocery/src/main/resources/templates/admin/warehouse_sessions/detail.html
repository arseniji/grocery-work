<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Сессия #' + ${ws.id} + ' — позиции'">Позиции сессии</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">

    <!-- Заголовок + навигация -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <a th:href="@{/admin/warehouse_sessions}" class="text-decoration-none text-muted small">← Сессии склада</a>
            <h2 class="mb-0" th:text="'Сессия #' + ${ws.id}"></h2>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/warehouse_sessions/{id}/export(id=${ws.id},format='json')}"
               class="btn btn-sm btn-outline-secondary">↓ JSON</a>
            <a th:href="@{/admin/warehouse_sessions/{id}/export(id=${ws.id},format='csv')}"
               class="btn btn-sm btn-outline-secondary">↓ CSV</a>
        </div>
    </div>

    <!-- Информация о сессии -->
    <div class="card mb-4">
        <div class="card-body d-flex flex-wrap gap-4">
            <div>
                <div class="text-muted small">Сотрудник</div>
                <span th:if="${ws.employee != null}"
                      th:text="${ws.employee.firstname + ' ' + ws.employee.lastname}"></span>
                <span th:unless="${ws.employee != null}" class="text-muted">—</span>
            </div>
            <div>
                <div class="text-muted small">Режим</div>
                <span class="badge"
                      th:classappend="${ws.mode.name() == 'RECEIVE'} ? 'bg-primary' :
                                      (${ws.mode.name() == 'WRITE_OFF'} ? 'bg-danger' : 'bg-warning text-dark')"
                      th:text="${ws.mode}"></span>
            </div>
            <div>
                <div class="text-muted small">Дата и время</div>
                <span th:text="${#temporals.format(ws.createdAt, 'dd.MM.yyyy HH:mm:ss')}"></span>
            </div>
            <div>
                <div class="text-muted small">Кампания</div>
                <span th:text="${ws.campaign != null} ? ${ws.campaign.title} : '—'"></span>
            </div>
        </div>
    </div>

    <!-- Таблица позиций -->
    <table class="table table-bordered table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Баркод</th>
            <th>Наименование</th>
            <th>Ед. изм.</th>
            <th>Количество</th>
            <th>Rails Product ID</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${items}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.barcode}"></td>
            <td th:text="${item.productName}"></td>
            <td th:text="${item.measurementUnit}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.railsProductId != null} ? ${item.railsProductId} : '—'"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(items)}">
            <td colspan="6" class="text-center text-muted">Нет позиций</td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
