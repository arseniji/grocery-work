<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Сессии склада</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Сессии склада</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/warehouse_sessions/export(format='json')}" class="btn btn-sm btn-outline-secondary">↓ JSON</a>
            <a th:href="@{/admin/warehouse_sessions/export(format='csv')}" class="btn btn-sm btn-outline-secondary">↓ CSV</a>
        </div>
    </div>

    <table class="table table-bordered table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Сотрудник</th>
            <th>Режим</th>
            <th>Дата и время</th>
            <th>Кампания</th>
            <th>Позиций</th>
            <th></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ws : ${warehouse_sessions}">
            <td th:text="${ws.id}"></td>
            <td>
                <a th:if="${ws.employee != null}"
                   th:href="@{/admin/employees/{id}/sessions(id=${ws.employee.id})}"
                   th:text="${ws.employee.firstname + ' ' + ws.employee.lastname}"></a>
                <span th:unless="${ws.employee != null}" class="text-muted">—</span>
            </td>
            <td>
                <span class="badge"
                      th:classappend="${ws.mode.name() == 'RECEIVE'} ? 'bg-primary' :
                                      (${ws.mode.name() == 'WRITE_OFF'} ? 'bg-danger' : 'bg-warning text-dark')"
                      th:text="${ws.mode}"></span>
            </td>
            <td th:text="${#temporals.format(ws.createdAt, 'dd.MM.yyyy HH:mm:ss')}"></td>
            <td th:text="${ws.campaign != null} ? ${ws.campaign.title} : '—'"></td>
            <td th:text="${#lists.size(ws.items)}"></td>
            <td>
                <a th:href="@{/admin/warehouse_sessions/{id}(id=${ws.id})}"
                   class="btn btn-sm btn-outline-primary">Позиции</a>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(warehouse_sessions)}">
            <td colspan="7" class="text-center text-muted">Нет сессий</td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
