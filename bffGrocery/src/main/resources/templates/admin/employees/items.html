<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Позиции — ' + ${employee.firstname} + ' ' + ${employee.lastname}">Позиции сотрудника</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <a th:href="@{/admin/employees}" class="text-decoration-none text-muted small">← Сотрудники</a>
            <h2 class="mb-0"
                th:text="'Позиции: ' + ${employee.firstname} + ' ' + ${employee.lastname}"></h2>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/employees/{id}/sessions(id=${employee.id})}"
               class="btn btn-sm btn-outline-secondary">Сессии</a>
            <a th:href="@{/admin/employees/{id}/items/export(id=${employee.id},format='json')}"
               class="btn btn-sm btn-outline-secondary">↓ JSON</a>
            <a th:href="@{/admin/employees/{id}/items/export(id=${employee.id},format='csv')}"
               class="btn btn-sm btn-outline-secondary">↓ CSV</a>
        </div>
    </div>

    <table class="table table-bordered table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Сессия</th>
            <th>Баркод</th>
            <th>Наименование</th>
            <th>Ед. изм.</th>
            <th>Количество</th>
            <th>Rails ID</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="item : ${items}">
            <td th:text="${item.id}"></td>
            <td th:text="${item.session.id}"></td>
            <td th:text="${item.barcode}"></td>
            <td th:text="${item.productName}"></td>
            <td th:text="${item.measurementUnit}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="${item.railsProductId != null} ? ${item.railsProductId} : '—'"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(items)}">
            <td colspan="7" class="text-center text-muted">Нет позиций</td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
