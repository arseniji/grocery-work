<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Сессии — ' + ${employee.firstname} + ' ' + ${employee.lastname}">Сессии сотрудника</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <a th:href="@{/admin/employees}" class="text-decoration-none text-muted small">← Сотрудники</a>
            <h2 class="mb-0"
                th:text="'Сессии: ' + ${employee.firstname} + ' ' + ${employee.lastname}"></h2>
        </div>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/employees/{id}/items(id=${employee.id})}"
               class="btn btn-sm btn-outline-secondary">Все позиции</a>
            <a th:href="@{/admin/employees/{id}/sessions/export(id=${employee.id},format='json')}"
               class="btn btn-sm btn-outline-secondary">↓ JSON</a>
            <a th:href="@{/admin/employees/{id}/sessions/export(id=${employee.id},format='csv')}"
               class="btn btn-sm btn-outline-secondary">↓ CSV</a>
        </div>
    </div>

    <table class="table table-bordered table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Режим</th>
            <th>Дата и время</th>
            <th>Кампания</th>
            <th>Позиций</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ws : ${sessions}">
            <td th:text="${ws.id}"></td>
            <td>
                <span class="badge"
                      th:classappend="${ws.mode.name() == 'RECEIVE'} ? 'bg-primary' :
                                      (${ws.mode.name() == 'WRITE_OFF'} ? 'bg-danger' : 'bg-warning text-dark')"
                      th:text="${ws.mode}"></span>
            </td>
            <td th:text="${#temporals.format(ws.createdAt, 'dd.MM.yyyy HH:mm:ss')}"></td>
            <td th:text="${ws.campaign != null} ? ${ws.campaign.title} : '—'"></td>
            <td th:text="${#lists.size(ws.items)}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(sessions)}">
            <td colspan="5" class="text-center text-muted">Нет сессий</td>
        </tr>
        </tbody>
    </table>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
