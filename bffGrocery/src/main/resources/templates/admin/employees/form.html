<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${employeeForm.id == null} ? 'Новый сотрудник' : 'Редактирование сотрудника'">Сотрудник</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container" style="max-width: 500px;">
    <h2 class="mb-4" th:text="${employeeForm.id == null} ? 'Новый сотрудник' : 'Редактирование сотрудника'"></h2>

    <form th:action="@{/admin/employees/save}" th:object="${employeeForm}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Логин</label>
            <input type="text" th:field="*{login}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">
                Пароль
                <span th:if="${employeeForm.id != null}" class="text-muted fw-normal">(оставьте пустым, чтобы не менять)</span>
            </label>
            <input type="password" th:field="*{newPassword}" class="form-control"
                   th:placeholder="${employeeForm.id == null} ? 'Обязательно' : '••••••••'">
        </div>

        <div class="mb-3">
            <label class="form-label">Имя</label>
            <input type="text" th:field="*{firstname}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Фамилия</label>
            <input type="text" th:field="*{lastname}" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Роль</label>
            <select th:field="*{role}" class="form-select">
                <option value="EMPLOYEE">EMPLOYEE</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a th:href="@{/admin/employees}" class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
