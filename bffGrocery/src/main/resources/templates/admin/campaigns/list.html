<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Инвентаризационные кампании</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Кампании</h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/campaigns/new}" class="btn btn-primary">+ Добавить</a>
            <a th:href="@{/admin/campaigns/export(format='json')}" class="btn btn-sm btn-outline-secondary">↓ JSON</a>
            <a th:href="@{/admin/campaigns/export(format='csv')}" class="btn btn-sm btn-outline-secondary">↓ CSV</a>
        </div>
    </div>

    <table class="table table-bordered table-striped table-hover align-middle">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Статус</th>
            <th>Создана</th>
            <th>Срок</th>
            <th>Завершена</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="campaign : ${campaigns}">
            <td th:text="${campaign.id}"></td>
            <td th:text="${campaign.title}"></td>
            <td>
                <span class="badge"
                      th:classappend="${campaign.status.name() == 'OPEN'} ? 'bg-success' : 'bg-secondary'"
                      th:text="${campaign.status}"></span>
            </td>
            <td th:text="${#temporals.format(campaign.createdAt, 'dd.MM.yyyy HH:mm:ss')}"></td>
            <td th:text="${campaign.deadline != null} ? ${#temporals.format(campaign.deadline, 'dd.MM.yyyy HH:mm')} : '—'"></td>
            <td th:text="${campaign.completedAt != null} ? ${#temporals.format(campaign.completedAt, 'dd.MM.yyyy HH:mm')} : '—'"></td>
            <td class="d-flex gap-1 flex-wrap">
                <a th:if="${campaign.status.name() == 'OPEN'}"
                   th:href="@{/admin/campaigns/edit/{id}(id=${campaign.id})}"
                   class="btn btn-sm btn-outline-primary">Изменить</a>
                <span th:unless="${campaign.status.name() == 'OPEN'}"
                      class="btn btn-sm btn-outline-secondary disabled">Изменить</span>

                <form th:if="${campaign.status.name() == 'OPEN'}"
                      th:action="@{/admin/campaigns/close/{id}(id=${campaign.id})}"
                      method="post" style="display:inline;"
                      onsubmit="return confirm('Закрыть кампанию и записать данные в Rails?')">
                    <button type="submit" class="btn btn-sm btn-warning">Закрыть</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(campaigns)}">
            <td colspan="6" class="text-center text-muted">Нет кампаний</td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
