<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${campaign.id == null} ? 'Новая кампания' : 'Редактирование кампании'">Кампания</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="container" style="max-width: 500px;">
    <h2 class="mb-3" th:text="${campaign.id == null} ? 'Новая кампания' : 'Редактирование кампании'"></h2>

    <!-- Ошибка валидации -->
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <!-- Закрытая кампания: только просмотр -->
    <div th:if="${campaign.id != null and campaign.status != null and campaign.status.name() == 'CLOSED'}"
         class="alert alert-secondary mb-3">
        Кампания закрыта — редактирование недоступно.
    </div>

    <form th:action="@{/admin/campaigns/save}" th:object="${campaign}" method="post">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{createdAt}">

        <div class="mb-3">
            <label class="form-label">Название</label>
            <input type="text" th:field="*{title}" class="form-control" required
                   th:readonly="${campaign.id != null and campaign.status != null and campaign.status.name() == 'CLOSED'}">
        </div>

        <div class="mb-3">
            <label class="form-label">Описание</label>
            <textarea th:field="*{description}" class="form-control" rows="3"
                      th:readonly="${campaign.id != null and campaign.status != null and campaign.status.name() == 'CLOSED'}"></textarea>
            <div class="form-text">Отображается в уведомлениях у сотрудников.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Срок окончания</label>
            <input type="datetime-local" th:field="*{deadline}" class="form-control"
                   th:readonly="${campaign.id != null and campaign.status != null and campaign.status.name() == 'CLOSED'}">
            <div class="form-text">Кампания закроется автоматически по истечении срока.</div>
        </div>

        <div th:if="${campaign.completedAt != null}" class="mb-3">
            <label class="form-label">Фактически закрыта</label>
            <input type="text" class="form-control" th:value="${campaign.completedAt}" readonly>
        </div>

        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary"
                    th:disabled="${campaign.id != null and campaign.status != null and campaign.status.name() == 'CLOSED'}">
                Сохранить
            </button>
            <a th:href="@{/admin/campaigns}" class="btn btn-outline-secondary">Отмена</a>
        </div>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
